name: Sync KPI Data from S3

on:
  schedule:
    # Daily at 07:00 UTC — after Databricks KPI export (target @daily pipeline)
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-kpi-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sync dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pyarrow pandas

      - name: Sync KPI parquet from S3 latest/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}
          S3_KPI_EXPORT_PREFIX: s3://nyc-lakehouse-store/exports/kpi/latest/
        run: python scripts/export/sync_kpi_from_s3.py

      - name: Commit and push dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/
          if git diff --staged --quiet; then
            echo "[INFO] No KPI data changes to commit"
          else
            git commit -m "$(cat <<'EOF'
chore: sync KPI parquet exports from S3

Automated sync from s3://nyc-lakehouse-store/exports/kpi/latest/ for Streamlit Community Cloud.
EOF
)"
            git push
            echo "[SUCCESS] Dashboard data committed and pushed"
          fi
