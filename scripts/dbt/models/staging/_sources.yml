version: 2

sources:
  - name: bronze
    description: >
      Bronze layer — append-only Delta tables written by Databricks Autoloader.
      Every column from the source API is retained. No deduplication at this layer.
    database: "nyc-lakehouse"
    schema: bronze

    tables:
      # ── 311 Service Requests ──
      - name: 311_requests
        identifier: 311_requests
        description: >
          NYC 311 service requests (2020–present). Source: Socrata API erm2-nwe9.
          Append-only — may contain duplicate unique_keys across ingestion batches.
        config:
          loaded_at_field: _ingested_at
          freshness:
            warn_after: { count: 25, period: hour }
            error_after: { count: 49, period: hour }
        columns:
          - name: unique_key
            description: "Primary key — unique complaint ID"
          - name: _ingested_at
            description: "Autoloader write timestamp"

      # ── NYPD Arrests ──
      - name: nypd_arrests
        description: >
          NYPD arrest records — union of Historic (8h9b-rp9u) and YTD (uip8-fykc).
          Append-only — duplicates handled in staging via QUALIFY dedup.
        config:
          loaded_at_field: _ingested_at
          freshness:
            warn_after: { count: 100, period: day }
            error_after: { count: 200, period: day }
        columns:
          - name: arrest_key
            description: "Primary key — unique arrest ID"
          - name: _ingested_at
            description: "Autoloader write timestamp"

      # ── DOB Permit Issuance ──
      - name: dob_permits
        description: >
          NYC Department of Buildings permit issuance records. Source: Socrata API ipu4-2q9a.
          Append-only — dedup on job__ + permit_sequence__ in staging.
        config:
          loaded_at_field: _ingested_at
          freshness:
            warn_after: { count: 25, period: hour }
            error_after: { count: 49, period: hour }
        columns:
          - name: job__
            description: "Primary key part 1 — job number"
          - name: permit_sequence__
            description: "Primary key part 2 — permit sequence"
          - name: _ingested_at
            description: "Autoloader write timestamp"

      # ── Restaurant Inspections ──
      - name: restaurant_inspections
        description: >
          DOHMH restaurant inspection results. Source: Socrata API 43nn-pn8j.
          One row per violation per inspection. Dedup key:
          camis + inspection_date + violation_code + inspection_type.
        config:
          loaded_at_field: _ingested_at
          freshness:
            warn_after: { count: 25, period: hour }
            error_after: { count: 49, period: hour }
        columns:
          - name: camis
            description: "Primary key part 1 — unique restaurant ID"
          - name: inspection_date
            description: "Primary key part 2 — date of inspection"
          - name: violation_code
            description: "Primary key part 3 — specific violation code"
          - name: inspection_type
            description: "Primary key part 4 — type of inspection"
          - name: _ingested_at
            description: "Autoloader write timestamp"

      # ── NYC ZCTA Polygons (static reference) ──
      - name: nyc_zcta_polygons
        description: >
          Static NYC Zip Code Tabulation Area (ZCTA) shapefile. One-time load
          from NYC Dept of City Planning. Used for NYPD spatial join in staging.
        columns:
          - name: zip_code
            description: "5-digit NYC zip code"
          - name: polygon
            description: "Geometry column — ZCTA boundary polygon"
